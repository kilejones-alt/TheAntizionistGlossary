<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Antizionist Glossary</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Montserrat:wght@500;600;700&display=swap");
:root {
  --bg: #020202;
  --text: #f3efe5;
  --gold: #e0bf67;
  --gold-soft: rgba(224,191,103,.24);
  --line: rgba(224,191,103,.20);
}
* { box-sizing: border-box; }
html, body { min-height: 100%; }
body {
  margin: 0;
  color: var(--text);
  overflow-x: hidden;
  background:
    radial-gradient(circle at 56% 42%, rgba(166,126,36,.16), transparent 19rem),
    radial-gradient(circle at 28% 42%, rgba(255,255,255,.05), transparent 16rem),
    radial-gradient(circle at 70% 64%, rgba(255,236,179,.045), transparent 22rem),
    linear-gradient(135deg, #000 0%, #0a0907 34%, #020202 67%, #000 100%);
  font-family: "Cormorant Garamond", Georgia, "Times New Roman", serif;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background:
    radial-gradient(ellipse at center, transparent 34%, rgba(0,0,0,.36) 74%, rgba(0,0,0,.74) 100%),
    linear-gradient(90deg, rgba(255,255,255,.02), transparent 18%, transparent 82%, rgba(255,255,255,.02));
}
.gallery-topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 30;
  display: flex;
  justify-content: flex-end;
  padding: 16px 24px;
  border-bottom: 1px solid rgba(224,191,103,.10);
  background: linear-gradient(to bottom, rgba(0,0,0,.58), rgba(0,0,0,0));
}
.gallery-topbar a, .glossary-only {
  color: var(--gold);
  text-decoration: none;
  text-transform: uppercase;
  letter-spacing: .28em;
  font: 600 10.5px/1 "Montserrat", Arial, Helvetica, sans-serif;
}
.ambient-lights {
  position: fixed;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
  z-index: 4;
}
.ambient-light {
  position: absolute;
  bottom: -12vh;
  left: var(--x);
  width: var(--s);
  height: var(--s);
  border-radius: 50%;
  background: rgba(255,229,150,var(--a));
  opacity: 0;
  box-shadow:
    0 0 calc(var(--s) * 2.2) rgba(255,218,120,calc(var(--a) * .9)),
    0 0 calc(var(--s) * 5.5) rgba(255,245,205,calc(var(--a) * .42));
  animation: rise var(--d) linear infinite, flicker 3.6s ease-in-out infinite;
  animation-delay: var(--delay), var(--fdelay);
}
@keyframes rise {
  0% { transform: translate3d(0, 0, 0) scale(.72); opacity: 0; }
  8% { opacity: .9; }
  55% { opacity: .48; }
  100% { transform: translate3d(var(--drift), -118vh, 0) scale(1.08); opacity: 0; }
}
@keyframes flicker {
  0%,100% { filter: brightness(.78); }
  26% { filter: brightness(1.45); }
  67% { filter: brightness(1.05); }
}
.home-stage {
  position: relative;
  z-index: 8;
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 72px 24px 28px;
}
.cover-gallery {
  width: min(1120px, 100%);
  display: grid;
  justify-items: center;
  gap: 30px;
}
.cover-panel {
  position: relative;
  width: min(980px, 100%);
  min-height: clamp(390px, 58vh, 465px);
  display: grid;
  grid-template-columns: minmax(280px, .92fr) minmax(340px, 1.08fr);
  align-items: center;
  gap: 24px;
  padding: clamp(26px, 4.2vw, 48px);
  overflow: hidden;
  border: 1px solid var(--line);
  background:
    radial-gradient(circle at 46% 48%, rgba(214,175,81,.10), transparent 18rem),
    radial-gradient(circle at 23% 52%, rgba(255,255,255,.05), transparent 17rem),
    linear-gradient(145deg, rgba(255,255,255,.028), rgba(0,0,0,.16) 45%, rgba(255,255,255,.014));
  box-shadow: 0 40px 100px rgba(0,0,0,.72), inset 0 1px 0 rgba(255,255,255,.05);
}
.cover-panel::before {
  content: "";
  position: absolute;
  inset: -1px;
  pointer-events: none;
  z-index: 0;
  background:
    radial-gradient(circle at 32% 52%, rgba(255,255,255,.08), transparent 17rem),
    radial-gradient(circle at 61% 50%, rgba(224,191,103,.07), transparent 19rem),
    radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,.56) 100%);
}
.cover-logo-wrap {
  position: relative;
  z-index: 2;
  justify-self: center;
  width: min(310px, 88%);
  display: grid;
  place-items: center;
  padding: 8px;
}
.cover-logo-wrap::before {
  content: "";
  position: absolute;
  inset: -12%;
  z-index: -1;
  background: radial-gradient(circle, rgba(255,255,255,.08), rgba(224,191,103,.03) 38%, transparent 68%);
  filter: blur(18px);
}
.cover-logo {
  width: 100%;
  display: block;
  opacity: .84;
  filter: brightness(1.05) contrast(1.02) drop-shadow(0 0 22px rgba(255,255,255,.06));
}
.cover-divider {
  position: absolute;
  left: 43.3%;
  top: 22%; bottom: 22%;
  width: 1px;
  background: linear-gradient(to bottom, transparent, rgba(224,191,103,.42), transparent);
}
.cover-title-block {
  position: relative;
  z-index: 2;
  text-align: left;
  text-shadow: 0 2px 0 rgba(0,0,0,.9), 0 0 26px rgba(0,0,0,.8);
}
.cover-kicker {
  margin: 0 0 17px;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: .46em;
  font: 600 9.5px/1 "Montserrat", Arial, Helvetica, sans-serif;
}
h1 {
  margin: 0;
  font-family: "Cormorant Garamond", Georgia, "Times New Roman", serif;
  font-size: clamp(48px, 6.4vw, 74px);
  line-height: .86;
  letter-spacing: .015em;
  font-weight: 600;
  color: #fff7e7;
  text-transform: uppercase;
}
.cover-subtitle {
  margin: 18px 0 0;
  color: var(--gold);
  font-family: "Cormorant Garamond", Georgia, "Times New Roman", serif;
  font-size: 22px;
  font-style: italic;
  font-weight: 500;
}
.cover-author {
  margin: 16px 0 0;
  color: rgba(255,244,223,.86);
  font-family: "Montserrat", Arial, Helvetica, sans-serif;
  font-size: 10px;
  font-style: normal;
  font-weight: 600;
  letter-spacing: .34em;
  text-transform: uppercase;
}
.plain-endorsement {
  width: min(720px, 94%);
  margin-top: clamp(6px, 2.2vh, 22px);
  justify-self: center;
  text-align: center;
  color: rgba(243,239,229,.86);
  font-family: "Cormorant Garamond", Georgia, "Times New Roman", serif;
  font-size: 16px;
  font-style: normal;
  font-weight: 500;
  line-height: 1.38;
  text-shadow: 0 0 18px #000;
}
.plain-endorsement p { margin: 0 0 5px; }
.plain-endorsement strong {
  display: inline-block;
  margin-top: 2px;
  color: var(--gold);
  font-style: normal;
  font-size: 19px;
  font-weight: 600;
  letter-spacing: .02em;
}
.plain-endorsement span {
  display: inline-block;
  margin-top: 4px;
  color: rgba(243,239,229,.64);
  text-transform: uppercase;
  letter-spacing: .27em;
  font: 600 8.5px/1.7 "Montserrat", Arial, Helvetica, sans-serif;
}
.glossary-only {
  align-self: start;
  justify-self: start;
  padding-bottom: 5px;
  border-bottom: 1px solid rgba(224,191,103,.65);
}

.cursor-orb {
  position: fixed;
  top: 0;
  left: 0;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  opacity: 0;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle at 32% 32%, rgba(255,252,240,.95) 0%, rgba(255,235,170,.92) 26%, rgba(232,199,109,.92) 58%, rgba(232,199,109,.18) 100%);
  box-shadow:
    0 0 8px rgba(255,231,168,.95),
    0 0 18px rgba(232,199,109,.72),
    0 0 34px rgba(232,199,109,.34);
  transition: opacity .18s ease, width .18s ease, height .18s ease, box-shadow .18s ease;
  mix-blend-mode: screen;
}
body.cursor-orb-active,
body.cursor-orb-active a,
body.cursor-orb-active button,
body.cursor-orb-active [role="button"] {
  cursor: none;
}
.cursor-orb.is-hovering {
  width: 18px;
  height: 18px;
  box-shadow:
    0 0 10px rgba(255,236,184,1),
    0 0 22px rgba(232,199,109,.85),
    0 0 44px rgba(232,199,109,.42);
}
@media (pointer: coarse) {
  .cursor-orb { display: none; }
  body.cursor-orb-active,
  body.cursor-orb-active a,
  body.cursor-orb-active button,
  body.cursor-orb-active [role="button"] {
    cursor: auto;
  }
}

@media (max-width: 860px) {
  .cover-panel {
    grid-template-columns: 1fr;
    gap: 22px;
    padding-top: 30px;
    padding-bottom: 30px;
  }
  .cover-divider { display: none; }
  .cover-title-block { text-align: center; }
  .plain-endorsement { justify-self: center; text-align: center; }
  .glossary-only { justify-self: center; }
}
</style>

    el.style.setProperty('--d', duration);
    el.style.setProperty('--delay', delay);
    el.style.setProperty('--fdelay', fdelay);
    el.style.setProperty('--x', x);
    el.style.setProperty('--drift', drift);
    container.appendChild(el);
  }

  const orb = document.getElementById('cursor-orb');
  if (!orb || window.matchMedia('(pointer: coarse)').matches) return;

  const setHoverState = (state) => orb.classList.toggle('is-hovering', state);

  document.addEventListener('mousemove', (event) => {
    orb.style.opacity = '1';
    orb.style.transform = `translate(${event.clientX}px, ${event.clientY}px) translate(-50%, -50%)`;
  });

  document.addEventListener('mouseleave', () => {
    orb.style.opacity = '0';
  });

  document.querySelectorAll('a, button, [role="button"]').forEach((el) => {
    el.addEventListener('mouseenter', () => setHoverState(true));
    el.addEventListener('mouseleave', () => setHoverState(false));
    el.addEventListener('focus', () => setHoverState(true));
    el.addEventListener('blur', () => setHoverState(false));
  });
})();
</script>
</body>
</html>
